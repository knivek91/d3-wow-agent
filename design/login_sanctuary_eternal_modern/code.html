<!-- Cinematic Background -->
<div class="absolute inset-0 z-0">
<div class="bg-cover bg-center w-full h-full opacity-60" data-alt="A breathtaking, cinematic dark fantasy landscape viewed from a high vantage point. A colossal, ancient gothic citadel rises from misty, rugged mountains, its spires piercing an ominous, stormy sky. Subtle, ethereal gold light bleeds from deep within the fortress windows, casting a mysterious, powerful ambient glow over the scene. The overall color palette is dominated by deep charcoal grays, obsidian blacks, and desaturated blues, starkly contrasted by the vibrant, ethereal golden illumination. The mood is one of powerful mystery and ancient grandeur, perfectly capturing a high-end, modern 'Neo-Ethereal' gaming aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAQ6zVhetki3_hyCr7R0FcfKsQbHYBiVrGHxcBRr5g1AwPdOLsw_I5mAAx9PMIuRQR9rS4547lu9iOwDlyl8lLlqaqfVyf_KgBZF4enXfBuQ5Hsf1tbss2aig3ZNPDxiqnTXNq29Ttu4a70tvA6agPuyALLFrawAOHQ0hpajkct4jWoZUYPW1qo7NAmq7mCXvAhScQo8XspZjr8wcynHVETp6cV2gbPjtPVsqJtQHd1GpSIbVOk7IP5')"></div>

</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-md px-margin-mobile md:px-0">
<!-- Logo Area -->
<div class="text-center mb-10">
<h1 class="font-display-lg text-display-lg text-primary mb-2 tracking-tight">Sanctuary Eternal</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Awaken Your Legacy</p>
</div>
<!-- Glassmorphic Card -->
<div class="glass-panel rounded-xl p-xl flex flex-col gap-lg items-center relative overflow-hidden">
<!-- Subtle internal glow top border effect -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-primary/50 to-transparent"></div>
<div class="w-20 h-20 rounded-full bg-surface-container flex items-center justify-center border border-white/10 mb-sm gold-glow">
<span class="material-symbols-outlined text-[40px] text-primary" style="font-variation-settings: 'FILL' 1;">
                    shield_moon
                </span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface text-center">Enter the Realm</h2>
<p class="font-body-md text-body-md text-on-surface-variant text-center mb-md">Connect your mortal tether to proceed.</p>
<!-- Primary Action -->
<button class="w-full bg-gradient-to-r from-primary-container to-primary text-on-primary font-label-md text-label-md py-4 px-lg rounded-lg flex items-center justify-center gap-sm transition-all duration-300 ease-out hover:scale-[1.02] active:scale-95 gold-glow relative overflow-hidden group">
<div class="absolute inset-0 bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="material-symbols-outlined">swap_horizontal_circle</span>
                Continue with Discord
            </button>
<!-- Decorative Divider -->
<div class="w-full flex items-center gap-sm opacity-50 my-sm">
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent to-outline-variant"></div>
<span class="material-symbols-outlined text-outline-variant text-sm">change_history</span>
<div class="h-[1px] flex-1 bg-gradient-to-l from-transparent to-outline-variant"></div>
</div>
<!-- Secondary Actions -->
<div class="flex flex-col sm:flex-row justify-between w-full gap-md mt-sm">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors flex items-center gap-xs justify-center group" href="#">
<span class="material-symbols-outlined text-[18px] group-hover:text-primary transition-colors">auto_stories</span>
                    Compendium
                </a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-error transition-colors flex items-center gap-xs justify-center group" href="#">
<span class="material-symbols-outlined text-[18px] group-hover:text-error transition-colors">logout</span>
                    Leave Realm
                </a>
</div>
</div>
<!-- Footer Note -->
<p class="text-center font-label-md text-[12px] text-on-surface-variant/50 mt-xl">
            By entering, you bind your soul to the Ethereal Pact.
        </p>
